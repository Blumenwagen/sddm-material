[General]
# Primary background color when no wallpaper is set (Material 3 Surface)
BackgroundColor="#595669"
Background="backgrounds/wallpaper.mp4"

# Dynamic vibrant accent colors for interactions
AccentColor="#5F8DD2"
AccentColorHover="#9BB8E3"

# Surface colors for cards and input fields
SurfaceColor="#13181F"
SurfaceColorAlpha="0.8"

# Text colors
TextColor="#FFFFFF"
TextHintColor="#A0A0A0"

# Font settings
FontFamily="Nunito, Quicksand, Ubuntu, sans-serif"
FontSize="16"
TimeFontSize="80"
DateFontSize="32"

# Corner radiuses for the playful Material 3 expressive look
CornerRadius="24"
InputCornerRadius="24"

type=color
